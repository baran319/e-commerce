{% extends "base.html" %}
{% block title %}Forgot Password | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🔒</div>
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a password reset link.</p>
    </div>

    <form method="post" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="resetEmail">Email Address</label>
        <input type="email" id="resetEmail" name="email" class="form-control" required placeholder="example@email.com" autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:20px;">Send Reset Link</button>
    </form>
    
    <div class="auth-footer-link" style="margin-top:24px;">
      Remembered your password? <a href="{{ url_for('auth.login') }}" style="color:var(--primary); font-weight:600;">Sign in here</a>
    </div>
  </div>
</div>
{% endblock %}
