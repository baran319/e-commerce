{% extends "base.html" %}
{% block title %}Giriş Yap | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏋️</div>
      <h1>Tekrar Hoş Geldiniz!</h1>
      <p>FitMarket hesabınıza giriş yapın</p>
    </div>

    {% if error %}
    <div class="flash flash-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="loginEmail">E-posta Adresi</label>
        <input type="email" id="loginEmail" name="email" class="form-control" required placeholder="ornek@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Şifre</label>
        <input type="password" id="loginPassword" name="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:0.9rem;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-muted);">
          <input type="checkbox" name="remember"> Beni hatırla
        </label>
        <a href="#" style="color:var(--accent);">Şifremi unuttum</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">🚀 Giriş Yap</button>
    </form>

    <div class="auth-footer">
      Hesabınız yok mu? <a href="{{ url_for('auth.register') }}" style="color:var(--accent); font-weight:600;">Ücretsiz Kayıt Ol</a>
    </div>
  </div>
</div>
{% endblock %}
