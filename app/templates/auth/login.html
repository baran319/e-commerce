{% extends "base.html" %}
{% block title %}Sign In | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🏋️</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your FitMarket account</p>
    </div>

    {% if error %}
    <div class="flash flash-danger" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" name="email" class="form-control" required placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:0.88rem;">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; color:var(--text-muted);">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--primary);">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Sign In</button>
    </form>

    <div class="auth-footer-link">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--primary); font-weight:600;">Register for free</a>
    </div>
  </div>
</div>
{% endblock %}
