{% extends "base.html" %}
{% block title %}Reset Password | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🔑</div>
      <h2>Reset Password</h2>
      <p>Enter your new password below.</p>
    </div>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="password" class="form-control" required placeholder="••••••••" minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" name="confirm_password" class="form-control" required placeholder="••••••••" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:20px;">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
