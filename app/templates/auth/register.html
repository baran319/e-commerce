{% extends "base.html" %}
{% block title %}Register | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 520px;">
    <div class="auth-header">
      <div class="auth-logo">💪</div>
      <h2>Create an Account</h2>
      <p>Join thousands of athletes on FitMarket</p>
    </div>

    {% if error %}
    <div class="flash flash-danger" style="margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label" for="regFirst">First Name</label>
          <input type="text" id="regFirst" name="first_name" class="form-control" placeholder="First name">
        </div>
        <div class="form-group">
          <label class="form-label" for="regLast">Last Name</label>
          <input type="text" id="regLast" name="last_name" class="form-control" placeholder="Last name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regUsername">Username *</label>
        <input type="text" id="regUsername" name="username" class="form-control" required placeholder="yourusername">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address *</label>
        <input type="email" id="regEmail" name="email" class="form-control" required placeholder="example@email.com">
      </div>
      <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label" for="regPass">Password *</label>
          <input type="password" id="regPass" name="password" class="form-control" required placeholder="Min. 6 characters">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassConfirm">Confirm Password *</label>
          <input type="password" id="regPassConfirm" name="confirm_password" class="form-control" required placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
    </form>

    <div class="auth-footer-link">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--primary); font-weight:600;">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
