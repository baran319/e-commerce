{% extends "base.html" %}
{% block title %}Kayıt Ol | FitMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 520px;">
    <div class="auth-logo">
      <div class="logo-icon">💪</div>
      <h1>Hesap Oluştur</h1>
      <p>Binlerce sporcu topluluğuna katıl</p>
    </div>

    {% if error %}
    <div class="flash flash-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="regFirst">Ad</label>
          <input type="text" id="regFirst" name="first_name" class="form-control" placeholder="Adınız">
        </div>
        <div class="form-group">
          <label class="form-label" for="regLast">Soyad</label>
          <input type="text" id="regLast" name="last_name" class="form-control" placeholder="Soyadınız">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regUsername">Kullanıcı Adı *</label>
        <input type="text" id="regUsername" name="username" class="form-control" required placeholder="kullanciad">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">E-posta *</label>
        <input type="email" id="regEmail" name="email" class="form-control" required placeholder="ornek@email.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="regPass">Şifre *</label>
          <input type="password" id="regPass" name="password" class="form-control" required placeholder="En az 6 karakter">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassConfirm">Şifre Tekrar *</label>
          <input type="password" id="regPassConfirm" name="confirm_password" class="form-control" required placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-accent btn-lg btn-full">🏋️ Kayıt Ol</button>
    </form>

    <div class="auth-footer">
      Zaten hesabınız var mı? <a href="{{ url_for('auth.login') }}" style="color:var(--accent); font-weight:600;">Giriş Yap</a>
    </div>
  </div>
</div>
{% endblock %}
